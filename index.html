<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感知引导交互 Demo</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* 视频流隐藏，仅作为数据源 */
        #input_video { display: none; }
        
        /* 渲染画布 */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        /* UI 引导层 */
        #ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            pointer-events: none; /* 穿透点击 */
            z-index: 10;
        }

        .guide-text {
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            margin-top: 60px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            transition: opacity 1s;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            font-size: 0.8rem;
        }

        /* 简单加载动画 */
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="loading">正在开启感官体验...</div>

    <div id="container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>

        <div id="ui-overlay">
            <div class="guide-text" id="main-text">跟随节奏轻轻呼吸</div>
            <div class="footer-text">将注意力放在此处</div>
        </div>
    </div>

    <!-- 引入 Three.js 和 MediaPipe Pose -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const mainText = document.getElementById('main-text');
        let isPressing = false;
        let rippleTime = 0;

        // --- 1. Three.js 场景初始化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        const renderer = new THREE.WebGLRenderer({
            canvas: canvasElement,
            alpha: true,
            antialias: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // --- 2. 创建自定义呼吸光圈 Shader ---
        const apertureShader = {
            uniforms: {
                uTime: { value: 0 },
                uColor: { value: new THREE.Color(0x88ccff) },
                uIntensity: { value: 1.0 },
                uRipple: { value: 0.0 },
                uPress: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform float uTime;
                uniform vec3 uColor;
                uniform float uIntensity;
                uniform float uRipple;
                uniform float uPress;

                void main() {
                    vec2 center = vec2(0.5, 0.5);
                    float dist = distance(vUv, center);
                    
                    // 呼吸动效 (3-5秒循环)
                    float breath = sin(uTime * 1.5) * 0.1 + 0.9;
                    float radius = 0.25 * breath * (1.0 + uPress * 0.5);
                    
                    // 基础渐变
                    float alpha = smoothstep(radius, radius - 0.2, dist);
                    alpha *= pow(1.0 - dist * 2.0, 2.0); // 边缘淡出

                    // 涟漪反馈
                    float ripple = 0.0;
                    if(uRipple > 0.0 && uRipple < 1.0) {
                        float rDist = abs(dist - uRipple * 0.5);
                        ripple = smoothstep(0.05, 0.0, rDist) * (1.0 - uRipple);
                    }

                    // 发光叠加
                    vec3 color = uColor + (ripple * 0.5) + (uPress * 0.2);
                    float finalAlpha = (alpha * 0.6 + ripple) * uIntensity;
                    
                    gl_FragColor = vec4(color, finalAlpha);
                }
            `
        };

        const material = new THREE.ShaderMaterial({
            uniforms: apertureShader.uniforms,
            vertexShader: apertureShader.vertexShader,
            fragmentShader: apertureShader.fragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const geometry = new THREE.PlaneGeometry(0.8, 0.8);
        const aperture = new THREE.Mesh(geometry, material);
        scene.add(aperture);
        aperture.visible = false; // 初始不可见，直到识别到人

        // --- 3. 背景视频纹理 ---
        // 直接将视频作为 Three.js 背景（可选，这里为了性能直接在 CSS 层放 Canvas 渲染 Pose 结果更佳）
        // 但为了完整感，我们创建一个视频平面放置在底层
        const videoTexture = new THREE.VideoTexture(videoElement);
        const bgGeometry = new THREE.PlaneGeometry(2, 2);
        const bgMaterial = new THREE.MeshBasicMaterial({ map: videoTexture });
        const bgMesh = new THREE.Mesh(bgGeometry, bgMaterial);
        bgMesh.position.z = -0.5;
        scene.add(bgMesh);

        // --- 4. MediaPipe Pose 逻辑 ---
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            document.getElementById('loading').style.display = 'none';

            if (results.poseLandmarks) {
                // 获取肩部中心点 (Landmark 11: 左肩, 12: 右肩)
                const leftShoulder = results.poseLandmarks[11];
                const rightShoulder = results.poseLandmarks[12];
                
                // 计算胸口中心 (归一化坐标 0-1)
                const centerX = (leftShoulder.x + rightShoulder.x) / 2;
                const centerY = (leftShoulder.y + rightShoulder.y) / 2;

                // 映射到 Three.js 坐标系 (-1 to 1)
                aperture.position.x = (centerX - 0.5) * 2;
                aperture.position.y = (0.5 - centerY) * 2;
                aperture.visible = true;

                // 动态调整提示语
                if (mainText.style.opacity === "0") mainText.style.opacity = "1";
            } else {
                aperture.visible = false;
            }
        });

        // --- 5. 交互逻辑 ---
        window.addEventListener('mousedown', startInteract);
        window.addEventListener('touchstart', startInteract);
        window.addEventListener('mouseup', endInteract);
        window.addEventListener('touchend', endInteract);

        function startInteract() {
            isPressing = true;
            rippleTime = 0.1; // 触发涟漪
            mainText.innerText = "静静感受这份连接";
        }

        function endInteract() {
            isPressing = false;
            mainText.innerText = "跟随节奏轻轻呼吸";
        }

        // --- 6. 渲染循环 ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            material.uniforms.uTime.value = elapsed;

            // 处理涟漪动画
            if (rippleTime > 0 && rippleTime < 1) {
                rippleTime += delta * 1.5;
                material.uniforms.uRipple.value = rippleTime;
            } else {
                material.uniforms.uRipple.value = 0;
            }

            // 处理长按能量聚拢
            const targetPress = isPressing ? 1.0 : 0.0;
            material.uniforms.uPress.value += (targetPress - material.uniforms.uPress.value) * 0.1;

            renderer.render(scene, camera);
        }

        // 启动相机
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        animate();

        // 响应窗口缩放
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
