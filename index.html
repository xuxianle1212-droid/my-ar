<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI中医全息交互终端 V4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root {
            --neon: #AEE31B;
            --glass: rgba(238, 253, 224, 0.1);
            --text-main: #EEFDE0;
        }

        body { margin: 0; background: #000; overflow: hidden; font-family: 'PingFang SC', sans-serif; color: white; }

        /* 顶部标题 */
        .header { 
            position: absolute; top: 0; width: 100%; height: 60px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .header h1 { margin: 0; letter-spacing: 10px; font-weight: 300; font-size: 24px; color: var(--neon); }

        /* 右侧面板 */
        .symptom-panel {
            position: absolute; right: 20px; top: 80px; width: 160px; z-index: 110;
        }
        .symptom-btn {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(174, 227, 27, 0.2); padding: 12px;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
            text-align: center; font-size: 13px; color: var(--text-main); margin-bottom: 10px;
        }
        .symptom-btn.active { background: var(--neon); color: #000; font-weight: bold; border-color: #fff; }

        /* 增强版智慧药方卡片 */
        #detail-card {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(200%);
            width: 360px; background: rgba(10, 25, 10, 0.95); border: 2px solid var(--neon);
            padding: 20px; border-radius: 20px; backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 200;
            box-shadow: 0 0 30px rgba(174, 227, 27, 0.4);
        }
        #detail-card.show { transform: translateX(-50%) translateY(0); }
        
        .card-header { border-bottom: 1px solid var(--neon); padding-bottom: 10px; margin-bottom: 15px; }
        .card-header h3 { margin: 0; color: var(--neon); font-size: 20px; letter-spacing: 2px; }
        
        .protocol-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .protocol-item { background: rgba(174, 227, 27, 0.1); padding: 8px; border-radius: 6px; font-size: 12px; }
        .protocol-label { color: var(--neon); display: block; margin-bottom: 2px; font-weight: bold; }
        
        .massage-guide { margin-top: 12px; font-size: 14px; line-height: 1.5; color: #fff; border-left: 3px solid var(--neon); padding-left: 10px; }

        #output_canvas { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; }
        #input_video { display: none; }
        
        .hint-text { position: absolute; top: 70px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; z-index: 10; }
    </style>
</head>
<body>

<div class="header"><h1>拍一拍</h1></div>
<div class="hint-text">点击穴位开启导引，点击空白处关闭</div>

<div class="symptom-panel">
    <div class="symptom-btn active" onclick="selectSymptom('reset', this)">全屏扫描</div>
    <div class="symptom-btn" onclick="selectSymptom('eye', this)">消除眼疲劳</div>
    <div class="symptom-btn" onclick="selectSymptom('head', this)">缓解头偏痛</div>
    <div class="symptom-btn" onclick="selectSymptom('nose', this)">感冒通鼻窍</div>
</div>

<div id="detail-card">
    <div class="card-header">
        <h3 id="p-name">穴位名称</h3>
    </div>
    <div class="info-section">
        <span style="font-size:12px; color:var(--neon)">[ 精准定位 ]</span>
        <div id="p-loc" style="font-size:14px; margin-top:4px;">加载中...</div>
    </div>
    
    <div class="protocol-grid">
        <div class="protocol-item"><span class="protocol-label">推荐手法</span><span id="p-tech">点按揉法</span></div>
        <div class="protocol-item"><span class="protocol-label">建议力度</span><span id="p-press">由轻渐重</span></div>
        <div class="protocol-item"><span class="protocol-label">引导时长</span><span id="p-dur">3-5分钟</span></div>
        <div class="protocol-item"><span class="protocol-label">经络感应</span><span>得气为准</span></div>
    </div>

    <div class="massage-guide" id="p-guide">请按照引导位置进行按压。</div>
</div>

<video id="input_video" playsinline></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let selectedType = 'reset';
    let activeAcupoint = null;
    let lastResults = null;

    // 数据库：增加精确手法内容
    const ACUPOINTS = [
        { name: "印堂", index: 9, loc: "两眉正中", tech: "拇指点揉", press: "中等深度", dur: "3分钟", guide: "用拇指腹点按，做小圆圈揉动，至额头微热感为佳。" },
        { name: "太阳穴", index: 21, loc: "眉尾外侧凹陷处", tech: "食指按揉", press: "轻柔微酸", dur: "5分钟", guide: "双手食指顺时针揉动，力度保持恒定，舒缓眼部神经。" },
        { name: "攒竹", index: 55, loc: "眉头凹陷处", tech: "点按法", press: "向下发力", dur: "2分钟", guide: "由下往上按压，感受眉骨处的微酸，有助于迅速明目。" },
        { name: "迎香穴", index: 129, loc: "鼻翼旁0.5寸", tech: "侧压法", press: "垂直按压", dur: "3分钟", guide: "垂直于皮肤按压，至鼻翼产生热感，可快速缓解鼻塞。" },
        { name: "四白", index: 101, loc: "瞳孔直下眶下孔", tech: "轻敲按揉", press: "极轻柔", dur: "2分钟", guide: "此处皮肤较薄，建议用中指轻轻打圈，促进眼周循环。" },
        { name: "颊车穴", index: 132, loc: "下颌角前上方", tech: "咬牙找点", press: "深层点按", dur: "4分钟", guide: "咬紧牙关找到最高点，松开后深层点揉，可缓解牙痛紧绷。" }
    ];

    const SYMPTOM_MAP = {
        'eye': ['攒竹', '四白'],
        'head': ['太阳穴', '印堂'],
        'nose': ['迎香穴', '印堂'],
        'reset': ACUPOINTS.map(p => p.name)
    };

    function selectSymptom(type, btn) {
        selectedType = type;
        document.querySelectorAll('.symptom-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        hideCard();
    }

    function onResults(results) {
        lastResults = results;
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.faceLandmarks) {
            drawCyberGrid(results.faceLandmarks);
            ACUPOINTS.forEach(p => {
                if (SYMPTOM_MAP[selectedType].includes(p.name)) {
                    drawMarker(results.faceLandmarks[p.index], p);
                }
            });
        }
        canvasCtx.restore();
    }

    // 绘制美化网格
    function drawCyberGrid(landmarks) {
        canvasCtx.beginPath();
        canvasCtx.strokeStyle = "rgba(174, 227, 27, 0.15)";
        canvasCtx.lineWidth = 0.5;
        [10, 332, 284, 251, 389, 356, 454, 323, 361, 288, 378, 152, 136, 93, 234, 127, 162, 21, 54, 103, 67, 10].forEach(idx => {
            canvasCtx.lineTo(landmarks[idx].x * canvasElement.width, landmarks[idx].y * canvasElement.height);
        });
        canvasCtx.stroke();
    }

    // 绘制穴位标记
    function drawMarker(lm, data) {
        const x = lm.x * canvasElement.width;
        const y = lm.y * canvasElement.height;
        const isAct = activeAcupoint?.name === data.name;

        canvasCtx.strokeStyle = isAct ? "#fff" : "#AEE31B";
        canvasCtx.lineWidth = isAct ? 3 : 1.5;
        
        // 准心
        canvasCtx.beginPath();
        canvasCtx.arc(x, y, 8, 0, Math.PI * 2);
        canvasCtx.stroke();
        
        if(isAct) {
            // 呼吸扩散环
            const scale = 1 + (Date.now() % 1000) / 1000;
            canvasCtx.beginPath();
            canvasCtx.arc(x, y, 10 * scale, 0, Math.PI * 2);
            canvasCtx.strokeStyle = `rgba(255,255,255,${1 - (Date.now() % 1000) / 1000})`;
            canvasCtx.stroke();
        }

        canvasCtx.save();
        canvasCtx.translate(x, y);
        canvasCtx.scale(-1, 1);
        canvasCtx.fillStyle = isAct ? "#fff" : "#AEE31B";
        canvasCtx.font = "bold 12px Arial";
        canvasCtx.fillText(data.name, 12, 4);
        canvasCtx.restore();
    }

    // --- 核心改进：精准点击与空白取消 ---
    canvasElement.addEventListener('click', (e) => {
        if (!lastResults || !lastResults.faceLandmarks) return;
        
        const rect = canvasElement.getBoundingClientRect();
        // 考虑镜像反转的点击 X 坐标
        const clickX = (rect.right - e.clientX) * (canvasElement.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvasElement.height / rect.height);

        let nearestPoint = null;
        let minDistance = 60; // 点击灵敏度范围：60像素内自动吸附

        // 搜索当前可见的所有穴位
        ACUPOINTS.forEach(p => {
            if (SYMPTOM_MAP[selectedType].includes(p.name)) {
                const lm = lastResults.faceLandmarks[p.index];
                const dx = clickX - lm.x * canvasElement.width;
                const dy = clickY - lm.y * canvasElement.height;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestPoint = p;
                }
            }
        });

        if (nearestPoint) {
            activeAcupoint = nearestPoint;
            showCard(nearestPoint);
        } else {
            // 点击空白处，取消选择
            activeAcupoint = null;
            hideCard();
        }
    });

    function showCard(p) {
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-loc').innerText = p.loc;
        document.getElementById('p-tech').innerText = p.tech;
        document.getElementById('p-press').innerText = p.press;
        document.getElementById('p-dur').innerText = p.dur;
        document.getElementById('p-guide').innerText = p.guide;
        document.getElementById('detail-card').classList.add('show');
    }

    function hideCard() {
        document.getElementById('detail-card').classList.remove('show');
    }

    const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
    holistic.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
    holistic.onResults(onResults);
    new Camera(videoElement, { onFrame: async () => await holistic.send({image: videoElement}), width: 1280, height: 720 }).start();
</script>
</body>
</html>
